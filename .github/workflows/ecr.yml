name: Build and push images to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, acc, prod]
      service:
        description: Service to build
        required: true
        default: all
        type: choice
        options: [all, game, lambda, wildbg]

env:
  AWS_REGION: eu-central-1
  # Pinned ref of gammonx-wildbg to check out. Override on dispatch by editing here,
  # or pin to a tag/sha for reproducible deploys.
  WILDBG_REF: main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gammonx-server
        uses: actions/checkout@v4
        with:
          path: gammonx-server

      - name: Checkout gammonx-wildbg
        if: ${{ inputs.service == 'all' || inputs.service == 'wildbg' || github.event_name == 'push' }}
        uses: actions/checkout@v4
        with:
          repository: gammonx/gammonx-wildbg
          ref: ${{ env.WILDBG_REF }}
          path: gammonx-wildbg
          token: ${{ secrets.WILDBG_REPO_TOKEN || github.token }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        working-directory: gammonx-server
        run: |
          scripts/push-images.sh \
            --env "${{ inputs.env || 'dev' }}" \
            --service "${{ inputs.service || 'all' }}" \
            --wildbg-path "${{ github.workspace }}/gammonx-wildbg"
